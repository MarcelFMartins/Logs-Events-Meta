<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="icone.png">
<title>Central de Dados</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070d;
    --bg2: #0f0f1a;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #eeeef5;
    --text2: #7777aa;
    --text3: #44445a;
    --accent: #6c63ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  nav {
    position: relative; z-index: 1;
    height: 56px; display: flex; align-items: center;
    padding: 0 32px; border-bottom: 1px solid var(--border);
    justify-content: space-between;
  }
  .nav-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; }
  .nav-btn {
    padding: 7px 18px; background: var(--accent); border: none; border-radius: 7px;
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; text-decoration: none; transition: opacity 0.2s;
  }
  .nav-btn:hover { opacity: 0.8; }

  main {
    position: relative; z-index: 1; flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  .center {
    text-align: center; max-width: 480px;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .tag {
    display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase;
    padding: 4px 12px; border: 1px solid rgba(108,99,255,0.25);
    border-radius: 100px; background: rgba(108,99,255,0.06); margin-bottom: 28px;
  }
  .tag::before { content: '● '; font-size: 7px; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  h1 {
    font-size: clamp(32px, 6vw, 52px); font-weight: 300; line-height: 1.15;
    letter-spacing: -0.02em; margin-bottom: 16px; color: var(--text);
  }
  h1 strong { font-weight: 500; }

  p {
    font-size: 15px; color: var(--text2); line-height: 1.7;
    margin-bottom: 40px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 32px; background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; text-decoration: none; transition: all 0.2s;
    box-shadow: 0 0 24px rgba(108,99,255,0.25);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(108,99,255,0.4); }
  .btn-arrow { font-size: 18px; transition: transform 0.2s; }
  .btn:hover .btn-arrow { transform: translateX(4px); }

  .meta {
    margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border);
    display: flex; gap: 32px; justify-content: center; flex-wrap: wrap;
  }
  .meta-item { text-align: center; }
  .meta-num { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--text); }
  .meta-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  footer {
    position: relative; z-index: 1;
    padding: 20px 32px; border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .status { display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: blink 3s infinite; }
</style>
</head>
<body>

<nav>
  <span class="nav-label">Central de Dados</span>
  <a href="dashboard.html" class="nav-btn">Entrar</a>
</nav>

<main>
  <div class="center">
    <div class="tag">Atualizado a cada hora</div>
    <h1>Tráfego, funil<br><strong>e resultados</strong></h1>
    <p>Acompanhe investimento, leads, reuniões e vendas em um único painel. Dados sincronizados automaticamente da planilha e da Meta.</p>
    <a href="dashboard.html" class="btn">
      Acessar painel
      <span class="btn-arrow">→</span>
    </a>
    <div class="meta">
      <div class="meta-item"><div class="meta-num">24+</div><div class="meta-label">Métricas</div></div>
      <div class="meta-item"><div class="meta-num">5</div><div class="meta-label">Abas</div></div>
      <div class="meta-item"><div class="meta-num">1h</div><div class="meta-label">Atualização</div></div>
    </div>
  </div>
</main>

<footer>
  <span>v1.0</span>
  <div class="status"><div class="status-dot"></div><span>Sistema operacional</span></div>
</footer>

</body>
</html>
